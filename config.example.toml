# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         DeepSeek TUI 配置文件                                ║
# ║                                                                              ║
# ║  DeepSeek 平台的非官方命令行工具 - 与 DeepSeek Inc. 无关                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# 参见 `docs/CONFIGURATION.md` 了解配置加载方式（配置文件、环境变量覆盖等）。

# ─────────────────────────────────────────────────────────────────────────────────
# 当前提供商 + DeepSeek 默认值
# ─────────────────────────────────────────────────────────────────────────────────
# 选择默认使用的提供商。每个提供商的凭据存放在本文件底部的 `[providers.*]`
# 段落中 — 同时保存多个提供商意味着 `/provider deepseek` 和
# `/provider nvidia-nim`（或 `--provider openai`、`--provider fireworks`、
# `/provider sglang`、`/provider vllm`、`/provider ollama`）之间切换时无需
# 重新输入密钥。当 `[providers.deepseek]` 不存在时，顶层 `api_key` / `base_url`
# 仍然作为 DeepSeek 默认值读取（向后兼容）。
provider = "deepseek" # deepseek | deepseek-cn | nvidia-nim | openai | openrouter | novita | fireworks | sglang | vllm | ollama
api_key = "YOUR_DEEPSEEK_API_KEY" # 不能为空
base_url = "https://api.deepseek.com/beta"
# provider = "deepseek-cn"                       # 中国大陆预设（官方 https://api.deepseek.com）
# base_url = "https://api.deepseek.com"          # 选择不使用 DeepSeek 测试版功能
# 用于 OpenAI 兼容网关的可选自定义模型请求头。
# Authorization 和 Content-Type 由客户端管理，不能在此处覆盖。
# http_headers = { "X-Model-Provider-Id" = "your-model-provider" }

# ─────────────────────────────────────────────────────────────────────────────────
# 默认模型
# ─────────────────────────────────────────────────────────────────────────────────
# DeepSeek V4 系列：
#   deepseek-v4-pro             — DeepSeek 平台的旗舰推理模型
#   deepseek-v4-flash           — 快速、成本高效（旧版别名：deepseek-chat，deepseek-reasoner）
#   deepseek-ai/deepseek-v4-pro   — NVIDIA NIM 托管的 Pro 模型 ID
#   deepseek-ai/deepseek-v4-flash — NVIDIA NIM 托管的 Flash 模型 ID
#   gpt-4.1                         — 默认通用 OpenAI 兼容模型 ID
#   accounts/fireworks/models/deepseek-v4-pro — Fireworks AI Pro 模型 ID
#   deepseek-ai/DeepSeek-V4-Pro    — SGLang 自托管 Pro 模型 ID
#   deepseek-ai/DeepSeek-V4-Flash  — SGLang 自托管 Flash 模型 ID
default_text_model = "deepseek-v4-pro"

# ─────────────────────────────────────────────────────────────────────────────────
# 推理模式（DeepSeek V4 推理强度）
# ─────────────────────────────────────────────────────────────────────────────────
# "off"    — 禁用思维链（thinking.type = disabled）
# "low"    — 兼容映射为服务端 "high"
# "medium" — 兼容映射为服务端 "high"
# "high"   — reasoning_effort = high（DeepSeek 默认）
# "max"    — reasoning_effort = max（最深推理）
#
# 在 TUI 中按 Shift+Tab 可在 off / high / max 之间切换。头部将当前等级显示为 ⚡ 芯片。
reasoning_effort = "max"

# ─────────────────────────────────────────────────────────────────────────────────
# 费用显示
# ─────────────────────────────────────────────────────────────────────────────────
# 以美元或人民币显示预估使用费用。别名 `yuan` 和 `rmb` 统一为 `cny`。
cost_currency = "usd" # usd | cny

# ─────────────────────────────────────────────────────────────────────────────────
# 路径
# ─────────────────────────────────────────────────────────────────────────────────
skills_dir = "~/.deepseek/skills"
mcp_config_path = "~/.deepseek/mcp.json"
notes_path = "~/.deepseek/notes.txt"

memory_path = "~/.deepseek/memory.md"

# instructions = ["./AGENTS.md", "~/.deepseek/global.md"]
#
# 可选的额外指令文件列表，按声明顺序拼接到系统提示词中（#454）。
# 适合在全局偏好文件之上叠加仓库特定规则。每个条目会展开
# `~` 和环境变量；缺失的文件会静默跳过并发出追踪警告。
# 每个文件上限为 100 KiB。
#
# 项目级配置（工作区中的 .deepseek/config.toml）会整体替换
# 用户级配置数组，而非合并 — 如需同时包含两者，请在项目配置数组中
# 明确写出 `~/global.md`。显式的空数组
#（`instructions = []`）会清除当前仓库的用户级列表。

# ─────────────────────────────────────────────────────────────────────────────────
# 用户记忆（#489）— 可选加入。启用后，TUI 在启动时读取 memory_path
# 并将其内容注入系统提示词作为 <user_memory> 块，拦截在输入框中
# 输入的 `# foo` 以追加带时间戳的条目，并注册一个 `remember` 工具
# 供模型自行调用以添加持久笔记。
# ─────────────────────────────────────────────────────────────────────────────────
[memory]
# enabled = true            # 开启此功能（默认：false）
# 覆盖环境变量别名：`DEEPSEEK_MEMORY=on`

# 已解析但当前未使用（为未来版本预留）：
# tools_file = "./tools.json"

# ─────────────────────────────────────────────────────────────────────────────────
# 安全设置
# ─────────────────────────────────────────────────────────────────────────────────
allow_shell = true
approval_policy = "on-request" # on-request | untrusted | never
sandbox_mode = "workspace-write" # read-only | workspace-write | danger-full-access | external-sandbox

# ─────────────────────────────────────────────────────────────────────────────────
# 外部沙箱后端（可插拔远程执行）
# ─────────────────────────────────────────────────────────────────────────────────
# 当 sandbox_backend 设置为 "opensandbox" 时，所有 exec_shell 调用
# 将通过外部 OpenSandbox 兼容的 HTTP API 路由，而不是生成本地进程。
# 后端发送 `POST {sandbox_url}/v1/sandbox/run`
# 包含 `{"cmd": "...", "env": {...}}` 并期望
# `{"stdout": "...", "stderr": "...", "exit_code": 0}`。
#
# sandbox_backend = "none"          # "none"（默认）或 "opensandbox"
# sandbox_url = "http://localhost:8080"  # OpenSandbox 兼容的 API 基础 URL
# sandbox_api_key = "YOUR_API_KEY"  # 随请求发送的可选 Bearer 令牌
#
# 环境变量覆盖：
#   DEEPSEEK_SANDBOX_BACKEND   → sandbox_backend
#   DEEPSEEK_SANDBOX_URL       → sandbox_url
#   DEEPSEEK_SANDBOX_API_KEY   → sandbox_api_key
#
# OpenSandbox 配置示例：
#
#   sandbox_backend = "opensandbox"
#   sandbox_url = "http://localhost:8080"
#   sandbox_api_key = "sk-opensandbox-secret"
#
# 后端使用 30 秒 HTTP 超时。外部后端不支持后台、交互式和
# TTY 模式 — 所有命令都通过 HTTP 同步运行。

# auto_allow 条目按命令前缀匹配，而不是原始字符串。
# 参见 command_safety.rs 了解前缀字典。
#
# 示例：
#   auto_allow = ["git status"]   # 自动批准：git status，git status -s，git status --porcelain
#                                 # 不自动批准：git push，git checkout
#   auto_allow = ["cargo check", "npm run"]
#
# auto_allow = []
max_subagents = 10 # 可选（1-20）

# 可选的子代理调优。max_concurrent 覆盖顶层的 max_subagents。
# [subagents]
# max_concurrent = 10

# 可选的管理策略路径（Unix 上默认为 /etc/deepseek/*.toml）：
# managed_config_path = "/etc/deepseek/managed_config.toml"
# requirements_path = "/etc/deepseek/requirements.toml"

# ─────────────────────────────────────────────────────────────────────────────────
# 各提供商凭据（对等提供商 — NIM 是一等公民，而非标志）
# ─────────────────────────────────────────────────────────────────────────────────
# 提供商可以同时存储；使用 `provider = "..."`（文件顶部）或
# `/provider deepseek` / `/provider nvidia-nim` / `--provider openai` /
# `/provider fireworks` 之间切换无需重新输入密钥。
# 环境变量覆盖任何在此设置的值：
#   DeepSeek：DEEPSEEK_API_KEY，DEEPSEEK_BASE_URL，DEEPSEEK_MODEL
#   NIM：      NVIDIA_API_KEY（或 NVIDIA_NIM_API_KEY），NIM_BASE_URL
#             （或 NVIDIA_NIM_BASE_URL / NVIDIA_BASE_URL），NVIDIA_NIM_MODEL
#   OpenAI 兼容：OPENAI_API_KEY，OPENAI_BASE_URL，OPENAI_MODEL
#   Fireworks：FIREWORKS_API_KEY，FIREWORKS_BASE_URL
#   SGLang：    SGLANG_BASE_URL，SGLANG_MODEL，可选 SGLANG_API_KEY
#   vLLM：      VLLM_BASE_URL，VLLM_MODEL，可选 VLLM_API_KEY
#   Ollama：    OLLAMA_BASE_URL，OLLAMA_MODEL，可选 OLLAMA_API_KEY

# DeepSeek 平台（https://platform.deepseek.com）
[providers.deepseek]
# api_key = "YOUR_DEEPSEEK_API_KEY"
# base_url = "https://api.deepseek.com/beta"
# model = "deepseek-v4-pro"
# http_headers = { "X-Model-Provider-Id" = "your-model-provider" } # 可选的自定义请求头

# NVIDIA NIM 托管的 DeepSeek V4（https://build.nvidia.com）
[providers.nvidia_nim]
# api_key = "YOUR_NVIDIA_API_KEY"
# base_url = "https://integrate.api.nvidia.com/v1"
# model = "deepseek-ai/deepseek-v4-pro"     # 或 deepseek-ai/deepseek-v4-flash

# 通用 OpenAI 兼容端点
[providers.openai]
# api_key = "YOUR_OPENAI_COMPATIBLE_API_KEY"
# base_url = "https://api.openai.com/v1"
# model = "gpt-4.1"

# Fireworks AI 托管的 DeepSeek V4（https://fireworks.ai）
[providers.fireworks]
# api_key = "YOUR_FIREWORKS_API_KEY"
# base_url = "https://api.fireworks.ai/inference/v1"
# model = "accounts/fireworks/models/deepseek-v4-pro"

# 自托管 SGLang OpenAI 兼容服务器
[providers.sglang]
# api_key = "OPTIONAL_SGLANG_TOKEN"
# base_url = "http://localhost:30000/v1"
# model = "deepseek-ai/DeepSeek-V4-Pro"     # 或 deepseek-ai/DeepSeek-V4-Flash

# 自托管 vLLM OpenAI 兼容服务器
[providers.vllm]
# api_key = "OPTIONAL_VLLM_TOKEN"
# base_url = "http://localhost:8000/v1"
# model = "deepseek-ai/DeepSeek-V4-Pro"     # 或 deepseek-ai/DeepSeek-V4-Flash

# 自托管 Ollama OpenAI 兼容服务器
[providers.ollama]
# api_key = "OPTIONAL_OLLAMA_TOKEN"
# base_url = "http://localhost:11434/v1"
# model = "deepseek-coder:1.3b"             # 或任何本地 Ollama 标签

# ─────────────────────────────────────────────────────────────────────────────────
# 网络策略（#135）
# ─────────────────────────────────────────────────────────────────────────────────
# 针对 TUI 工具（`fetch_url`、`web_search`）和 MCP HTTP 传输发出的
# 出站网络调用的按域名允许/拒绝规则。Stdio MCP 服务器和
# 直接 LLM API 调用不受影响。
#
# 优先级：拒绝优先。同时出现在 `allow` 和 `deny` 中的主机被拒绝。
#
# 主机匹配规则：
#   - 精确匹配：`api.deepseek.com` 只匹配 `api.deepseek.com`。
#   - 子域名通配符：以 `.` 开头的条目（如 `.example.com`）
#     匹配 `api.example.com` 和 `a.b.example.com`，但不匹配顶级
#     `example.com`。要同时覆盖两者，请列出两者。也支持 `*.example.com`。
#
# 默认值有意保守：当此段落不存在时，不执行任何策略
#（与 v0.7.0 之前的行为一致）。要启用：
#
# [network]
# default = "prompt"     # allow | deny | prompt
# allow = ["api.deepseek.com", "github.com", ".githubusercontent.com"]
# deny = []
# audit = true            # 每次调用在 ~/.deepseek/audit.log 中记录一行

# ─────────────────────────────────────────────────────────────────────────────────
# 技能（#140）
# ─────────────────────────────────────────────────────────────────────────────────
# `/skill install <spec>` 社区技能安装器的设置。
#   * registry_url           — 将裸名称解析为 `github:owner/repo` 规范的
#                              精选 index.json。可覆盖为指向私有 fork 或内部镜像。
#   * max_install_size_bytes — 每个技能未压缩大小的上限。超出此限制的
#                              tarball 在验证期间会被拒绝。
#                              默认：5 MiB。
#
# `/skill install` 受 `[network]` 限制。确保 `github.com` 和
# `raw.githubusercontent.com` 可达（默认 `prompt` 也没问题 — 你会被询问一次
# 并可以持久化），然后才能运行。
#
# [skills]
# registry_url = "https://raw.githubusercontent.com/Hmbown/deepseek-skills/main/index.json"
# max_install_size_bytes = 5_242_880

# ─────────────────────────────────────────────────────────────────────────────────
# TUI
# ─────────────────────────────────────────────────────────────────────────────────
[tui]
alternate_screen = "auto"   # auto/always 使用 TUI 屏幕；never 使用终端回滚
mouse_capture = true        # true 仅复制对话中的用户/助手文本；false 使用原始终端选择/复制
terminal_probe_timeout_ms = 500 # 可选的启动终端模式超时（100-5000ms）
osc8_links = true            # 在 URL 周围发出 OSC 8 转义序列（iTerm2/Ghostty/Kitty/WezTerm/Terminal.app 13+ 中 Cmd+点击）；当终端渲染出错时设为 false
# notification_condition = "always" # always | never — 覆盖 [notifications].threshold_secs。
#                                    "always" = 每次成功轮次都通知（无阈值）；
#                                    "never"  = 禁止所有轮次完成通知；
#                                    不设置 = 使用 [notifications] 默认值（推荐）。
# locale = "auto"           # UI 界面语言：auto | en | ja | zh-Hans | pt-BR
#                           # "auto" 读取 LC_ALL → LC_MESSAGES → LANG；回退到英文。
#                           # 覆盖：`locale = "zh-Hans"` 强制使用简体中文，忽略系统区域。
#                           # 也可在运行时设置：/config locale zh-Hans
#                           # 注意：这只影响 TUI 标签/界面 — 它不改变模型输出语言。

# ─────────────────────────────────────────────────────────────────────────────────
# 功能开关
# ─────────────────────────────────────────────────────────────────────────────────
[features]
shell_tool = true
subagents = true
web_search = true # 启用规范的 web.run 及兼容的 web_search 别名
apply_patch = true
mcp = true
exec_policy = true

# ─────────────────────────────────────────────────────────────────────────────────
# 重试配置
# ─────────────────────────────────────────────────────────────────────────────────
[retry]
enabled = true
max_retries = 3
initial_delay = 1.0
max_delay = 60.0
exponential_base = 2.0

# ─────────────────────────────────────────────────────────────────────────────────
# 上下文压缩
# ─────────────────────────────────────────────────────────────────────────────────
# 自动压缩是一个已保存的 UI 设置，通过 `/config` 编辑（`auto_compact`）。
# 目前还没有配置文件中的 `[compaction]` 表；具体阈值由
# TUI 根据当前模型/上下文预算自动选择。

# 仅追加的 Flash seams 是实验性的，需要在 v0.7.5
# 上下文/缓存审计验证前缀缓存行为后才能选择加入。
[context]
enabled = false
verbatim_window_turns = 16
# 阈值基于当前请求输入估算值，而非生命周期累计 API 用量。
l1_threshold = 192000
l2_threshold = 384000
l3_threshold = 576000
# 硬循环保留正常的 262144 token 内部轮次预算加上 1024
# 安全 token，与 V4 官方 384000 最大输出元数据分开。
cycle_threshold = 768000
seam_model = "deepseek-v4-flash"

# ─────────────────────────────────────────────────────────────────────────────────
# Workshop / 大输出路由（#548）
# ─────────────────────────────────────────────────────────────────────────────────
# 超出 `large_output_threshold_tokens` 的工具输出通过
# V4-Flash 合成子代理路由。只有合成结果到达父级上下文；
# 原始文本存储在 workshop 变量 `last_tool_result` 中，以便
# 父级可以在需要完整内容时稍后调用 `promote_to_context`。
#
# 每个工具的覆盖允许高输出量工具（如 exec_shell）使用更严格的
# 阈值而无需更改全局默认值。
#
# 向任何工具调用添加 `raw = true` 以绕过该调用的路由。
#
# [workshop]
# large_output_threshold_tokens = 4096
# [workshop.per_tool_thresholds]
# exec_shell  = 2048   # shell 输出被积极合成
# grep_files  = 2048
# web_search  = 8192   # 网页结果可能很大；给予更多空间

# ─────────────────────────────────────────────────────────────────────────────────
# 容量控制器（运行时压力防护栏）
# ─────────────────────────────────────────────────────────────────────────────────
[capacity]
enabled = false
low_risk_max = 0.50
medium_risk_max = 0.62
severe_min_slack = -0.25
severe_violation_ratio = 0.40
refresh_cooldown_turns = 6
replan_cooldown_turns = 5
max_replay_per_turn = 1
min_turns_before_guardrail = 4
profile_window = 8
deepseek_v3_2_chat_prior = 3.9
deepseek_v3_2_reasoner_prior = 4.1
deepseek_v4_pro_prior = 3.5
deepseek_v4_flash_prior = 4.2
fallback_default_prior = 3.8

# ─────────────────────────────────────────────────────────────────────────────────
# 配置文件示例（用于多环境）
# ─────────────────────────────────────────────────────────────────────────────────
# 使用 `deepseek --profile <名称>` 或 `DEEPSEEK_PROFILE=<名称>` 选择配置文件。
[profiles.work]
api_key = "WORK_DEEPSEEK_API_KEY"
base_url = "https://api.deepseek.com/beta"

[profiles.dev]
api_key = "DEV_DEEPSEEK_API_KEY"
allow_shell = true

[profiles.nvidia-nim]
provider = "nvidia-nim"
api_key = "YOUR_NVIDIA_API_KEY"
base_url = "https://integrate.api.nvidia.com/v1"
default_text_model = "deepseek-ai/deepseek-v4-pro"

# ─────────────────────────────────────────────────────────────────────────────────
# 桌面通知（Agent 轮次长时间完成时的 OSC 9 / BEL）
# ─────────────────────────────────────────────────────────────────────────────────
# 当轮次**成功完成**且耗时超过 `threshold_secs` 时，
# 向终端发送转义序列。失败或取消的轮次会故意静默。
# 当您离开 TUI 并希望收到"您的任务已就绪"的提醒时很有用。
#
# method        = "auto"   # auto | osc9 | bel | off
#                 auto：iTerm.app / Ghostty / WezTerm 使用 OSC 9。
#                       在 macOS / Linux 上回退到 BEL。
#                       在 Windows 上回退到 "off" — BEL 映射到
#                       系统错误提示音（SystemAsterisk / MB_OK），听起来像
#                       错误弹窗。显式设置 method = "bel"
#                       以重新启用（#583）。
#                 osc9：\x1b]9;<消息>\x07（iTerm2 风格；显示 macOS 通知）
#                 bel：  纯 \x07 蜂鸣声
#                 off：  完全禁用
# threshold_secs = 30      # 仅当轮次耗时 >= 此秒数时通知
# include_summary = false  # 在通知正文中包含耗时和费用
[notifications]
# method = "auto"
# threshold_secs = 30
# include_summary = false

# ─────────────────────────────────────────────────────────────────────────────────
# 工作区快照（#137）
# ─────────────────────────────────────────────────────────────────────────────────
# 每个轮次 TUI 会将工作区的 `pre-turn:<序号>` 和 `post-turn:<序号>` 快照
# 保存到侧边 git 仓库中，位于：
#
#     ~/.deepseek/snapshots/<项目哈希>/<工作树哈希>/.git
#
# 您自己的 .git 永远不会被触及 — 执行 git 命令时 `--git-dir` 和
# `--work-tree` 总是同时设置。使用 `/restore N`（斜杠命令）或
# `revert_turn` 工具来回滚工作树。对话历史不受影响。
#
# 磁盘占用：~1-2 GB 最坏情况（100 MB 工作区 × 每天 12 轮），
# 借助 git 的内容寻址存储通常少得多。会话启动时
# 会清理超过 `max_age_days`（默认 7）的旧快照。
#
# [snapshots]
# enabled = true        # 每个轮次前后快照工作区，用于 /restore
# max_age_days = 7      # 会话启动时清理旧快照

# ─────────────────────────────────────────────────────────────────────────────────
# LSP 诊断（编辑后）（#136）
# ─────────────────────────────────────────────────────────────────────────────────
# 每次成功编辑文件（`edit_file`、`apply_patch`、`write_file`）后，
# 引擎会向 LSP 服务器请求该文件的诊断信息，并将其作为
# 合成系统消息注入到下一次 API 调用之前。这使代理能立即看到
# 编译错误，无需经过用户往返。
#
# 默认启用。失败模式是非阻塞的：缺失 LSP 二进制文件、
# 崩溃的服务器或超时只会跳过该轮次的编辑后钩子 —
# 代理的工作永远不会被阻塞。
#
# 内置语言 → 服务器默认值：
#   rust       → rust-analyzer
#   go         → gopls serve
#   python     → pyright-langserver --stdio
#   typescript → typescript-language-server --stdio
#   c, cpp     → clangd
#
# 通过下面的 `servers` 表覆盖默认值。
[lsp]
# enabled = true
# poll_after_edit_ms = 5000
# max_diagnostics_per_file = 20
# include_warnings = false
# [lsp.servers]
# rust = ["rust-analyzer"]
# go = ["gopls", "serve"]

# ─────────────────────────────────────────────────────────────────────────────────
# 钩子（可选）
# ─────────────────────────────────────────────────────────────────────────────────
# 钩子在生命周期事件（会话开始/结束、工具调用等）时运行 shell 命令。
# 在 `[hooks]` 表下配置为 `[[hooks.hooks]]`。
#
# 可用事件：session_start，session_end，message_submit，
# tool_call_before，tool_call_after，mode_change，on_error，shell_env。
#
# `shell_env`（#456）是特殊的：该钩子在每次 `exec_shell` 调用之前
# 立即运行，其 stdout 被解析为 `KEY=VALUE\n` 行。
# 这些变量会合并到生成的进程环境中（后面的钩子覆盖前面的）。
# 用于临时凭据、按技能调整 PATH 或短期令牌。
# 解析后的 KEY 名称（而非值）会写入 `~/.deepseek/audit.log`，
# 以便以后可以核对每个会话。钩子失败/超时只是不贡献变量 —
# 不会中止 shell 调用。
#
# [hooks]
# enabled = true
# default_timeout_secs = 30
#
# [[hooks.hooks]]
# event = "session_start"
# command = "echo 'DeepSeek TUI 会话已启动'"
#
# # 向每个 shell 调用注入临时凭据。在 stdout 上每行输出一个
# # KEY=VALUE（export 前缀可选）。
# [[hooks.hooks]]
# name = "aws-creds"
# event = "shell_env"
# command = "aws-vault export my-profile --format=env"
# # 可选地限制为特定工具名称/类别：
# # condition = { type = "tool_category"，category = "shell" }

# ─────────────────────────────────────────────────────────────────────────────────
# 运行时 API（`deepseek serve --http`）（#561）
# ─────────────────────────────────────────────────────────────────────────────────
# 本地 HTTP/SSE 守护进程的调优参数。服务器默认绑定到 127.0.0.1，
# 用于本地 UI（whalescale-desktop、仪表盘、自动化脚本）。
# 目前此部分仅控制 CORS 允许列表；
# 主机/端口/工作进程保持在 `--host`、`--port` 和 `--workers` 标志中。
#
# 内置默认值始终包括：
#   http://localhost:3000   http://127.0.0.1:3000
#   http://localhost:1420   http://127.0.0.1:1420
#   tauri://localhost
#
# 使用 `cors_origins` 添加额外的开发源（例如 Vite 的默认 `:5173`）。
# 用户条目**叠加**在默认值之上 — 它们不会替换默认值。CLI 标志
# `--cors-origin URL`（可重复）和环境变量
# `DEEPSEEK_CORS_ORIGINS=url1，url2` 解析到相同的合并列表。
#
# [runtime_api]
# cors_origins = ["http://localhost:5173"，"http://127.0.0.1:5173"]

